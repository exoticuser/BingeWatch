<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room — BingeWatch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/room.css" />
</head>
<body>

  <!-- ░░ LOADING OVERLAY ░░ -->
  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <div class="overlay-icon">🎬</div>
      <h2>Joining watch party…</h2>
      <p id="overlay-msg">Connecting to the room</p>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- ░░ HEADER ░░ -->
  <header class="r-header">
    <a href="/" class="r-logo" title="Back to home">🎬 BingeWatch</a>

    <div class="r-room-pill">
      <span class="r-room-label">Room</span>
      <span class="r-room-id" id="room-id-display">——</span>
      <button class="icon-btn" id="copy-btn" title="Copy invite link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
      </button>
    </div>

    <div class="r-header-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        <span id="viewer-count">1</span> watching
      </div>
      <button class="leave-btn" id="leave-btn">✕ Leave</button>
    </div>
  </header>

  <!-- ░░ MAIN ░░ -->
  <div class="r-main">

    <!-- ╔═ VIDEO COLUMN ═╗ -->
    <section class="video-col" id="video-col">

      <!-- URL Bar -->
      <div class="url-bar">
        <span class="url-bar-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
          </svg>
        </span>
        <input id="url-input" type="text" placeholder="Paste a YouTube URL or direct video link (.mp4, .webm) and press Load…" autocomplete="off" spellcheck="false" />
        <button class="load-btn" id="load-btn">Load</button>
      </div>

      <!-- Video Container -->
      <div class="video-wrap" id="video-wrap">

        <!-- YouTube wrapper -->
        <div id="yt-wrap" style="display:none; width:100%; height:100%; position:absolute; inset:0;">
          <div id="yt-player"></div>
        </div>

        <!-- HTML5 wrapper -->
        <div id="h5-wrap" style="display:none; width:100%; height:100%; position:absolute; inset:0;">
          <video id="h5-video" preload="metadata" playsinline></video>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="empty-state">
          <div class="empty-emoji">🍿</div>
          <h3>Nothing's playing yet</h3>
          <p>Paste a video URL in the bar above to start watching together.</p>
          <div class="empty-chips">
            <span>✅ YouTube</span>
            <span>✅ .mp4</span>
            <span>✅ .webm</span>
            <span>✅ Direct links</span>
          </div>
        </div>

        <!-- Reaction emojis fly here -->
        <div class="reaction-layer" id="reaction-layer" aria-hidden="true"></div>
      </div>

      <!-- Custom Controls (HTML5 only) -->
      <div class="controls-bar" id="controls-bar" style="display:none">
        <button class="ctrl" id="pp-btn" title="Play / Pause">
          <!-- play icon -->
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
          <!-- pause icon -->
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" style="display:none">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>

        <span class="time-cur" id="time-cur">0:00</span>

        <div class="seek-bar" id="seek-bar">
          <div class="seek-fill" id="seek-fill"></div>
          <div class="seek-thumb"></div>
        </div>

        <span class="time-dur" id="time-dur">0:00</span>

        <div class="vol-group">
          <button class="ctrl" id="mute-btn" title="Mute">🔊</button>
          <input class="vol-slider" id="vol-slider" type="range" min="0" max="1" step="0.05" value="1" />
        </div>

        <button class="ctrl" id="fs-btn" title="Fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>

    </section><!-- /video-col -->

    <!-- ╔═ SIDEBAR ═╗ -->
    <aside class="sidebar" id="sidebar">

      <!-- Toggle sidebar on mobile -->
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>

      <div class="sidebar-inner" id="sidebar-inner">

        <!-- ── Facecam ── -->
        <div class="sb-section" id="cam-section">
          <div class="sb-head">
            <span class="sb-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
                <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
              </svg>
              Cameras
            </span>
            <button class="cam-btn" id="cam-btn">
              <span id="cam-btn-text">Turn On</span>
            </button>
          </div>
          <div class="cam-grid" id="cam-grid">
            <div class="no-cams" id="no-cams">No cameras active</div>
          </div>
        </div>

        <!-- ── Viewers ── -->
        <div class="sb-section sb-users">
          <div class="sb-head">
            <span class="sb-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                <path d="M16 3.13a4 4 0 010 7.75"/>
              </svg>
              Viewers
            </span>
            <span class="user-badge-count" id="user-count-badge">0</span>
          </div>
          <ul class="users-list" id="users-list" aria-label="Viewers in room"></ul>
        </div>

        <!-- ── Chat ── -->
        <div class="sb-section sb-chat">
          <div class="sb-head">
            <span class="sb-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
              Chat
            </span>
          </div>

          <div class="chat-msgs" id="chat-msgs" role="log" aria-live="polite" aria-label="Chat messages"></div>

          <!-- Reaction bar -->
          <div class="reaction-bar">
            <button class="react-btn" data-emoji="👍">👍</button>
            <button class="react-btn" data-emoji="❤️">❤️</button>
            <button class="react-btn" data-emoji="😂">😂</button>
            <button class="react-btn" data-emoji="😮">😮</button>
            <button class="react-btn" data-emoji="🔥">🔥</button>
            <button class="react-btn" data-emoji="🎬">🎬</button>
          </div>

          <div class="chat-input-row">
            <input id="chat-input" type="text" placeholder="Say something…" maxlength="300" autocomplete="off" />
            <button class="send-btn" id="send-btn" aria-label="Send message">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
              </svg>
            </button>
          </div>
        </div>

      </div><!-- /sidebar-inner -->
    </aside><!-- /sidebar -->

  </div><!-- /r-main -->

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="/js/netlify-env.js"></script>
  <script src="/js/socket-config.js"></script>
  <!-- YouTube IFrame API — must load before room.js uses it -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/room.js"></script>
</body>
</html>
